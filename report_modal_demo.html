<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Modal Detail Laporan - Bootstrap 5</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h1 class="h2 mb-1">Daftar Laporan</h1>
                        <p class="text-muted mb-0">Klik tombol Detail untuk melihat modal dinamis.</p>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th>Judul</th>
                                <th>Pelapor</th>
                                <th>Kategori</th>
                                <th>Tanggal</th>
                                <th>Status</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="reportTableBody">
                            <!-- Data akan diisi oleh JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Dinamis Bootstrap 5 -->
    <div class="modal fade" id="reportDetailModal" tabindex="-1" aria-labelledby="reportDetailModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 class="modal-title h5 mb-0" id="reportDetailModalLabel">Detail Laporan</h2>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Tutup"></button>
                </div>
                <div class="modal-body" id="reportDetailBody">
                    <!-- Konten dinamis -->
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Data dummy lokal (contoh reports)
        const reports = [
            {
                id: 1,
                judul: 'Pojok Sampah Menumpuk di Pasar Tugu',
                pelapor: 'Budi Santoso',
                kategori: 'Kebersihan',
                tanggal: '2024-10-15 08:30',
                status: 'In Progress',
                statusClass: 'warning'
            },
            {
                id: 2,
                judul: 'Lampu Jalan Rusak di Jln. Teuku Umar',
                pelapor: 'Siti Aminah',
                kategori: 'Infrastruktur',
                tanggal: '2024-10-14 16:45',
                status: 'Verified',
                statusClass: 'info'
            },
            {
                id: 3,
                judul: 'Pembuangan Air Limbah Ilegal',
                pelapor: 'Ahmad Fauzi',
                kategori: 'Lingkungan',
                tanggal: '2024-10-13 11:20',
                status: 'Resolved',
                statusClass: 'success'
            },
            {
                id: 4,
                judul: 'Jalan Berlubang di Gang Merdeka',
                pelapor: 'Dewi Sartika',
                kategori: 'Infrastruktur',
                tanggal: '2024-10-12 14:10',
                status: 'Reported',
                statusClass: 'secondary'
            },
            {
                id: 5,
                judul: 'Pohon Tumbang Menutup Jalan',
                pelapor: 'Rudi Hartono',
                kategori: 'Bencana',
                tanggal: '2024-10-11 09:55',
                status: 'In Progress',
                statusClass: 'warning'
            }
        ];

        // Render table
        document.addEventListener('DOMContentLoaded', function() {
            const tbody = document.getElementById('reportTableBody');
            tbody.innerHTML = reports.map(report => `
                <tr>
                    <td>
                        <div class="fw-bold">${report.judul}</div>
                        <div class="small text-muted">Deskripsi singkat...</div>
                    </td>
                    <td>${report.pelapor}</td>
                    <td>
                        <span class="badge bg-${getStatusBg(report.statusClass)}">${report.kategori}</span>
                    </td>
                    <td>${report.tanggal}</td>
                    <td>
                        <span class="badge bg-${getStatusBg(report.statusClass)}">${report.status}</span>
                    </td>
                    <td>
                        <button class="btn btn-sm btn-outline-primary" onclick="showDetail(${report.id})">
                            <i class="bi bi-eye"></i> Detail
                        </button>
                    </td>
                </tr>
            `).join('');
        });

        // Fungsi helper untuk badge class
        function getStatusBg(statusClass) {
            const map = {
                'success': 'success',
                'warning': 'warning',
                'info': 'info',
                'secondary': 'secondary'
            };
            return map[statusClass] || 'primary';
        }

        // Fungsi tampilkan modal dinamis
        function showDetail(id) {
            const report = reports.find(r => r.id === id);
            if (!report) return;

            const modalTitle = document.getElementById('reportDetailModalLabel');
            const modalBody = document.getElementById('reportDetailBody');

            modalTitle.textContent = report.judul;

            modalBody.innerHTML = `
                <div class="row g-4">
                    <div class="col-md-6">
                        <div class="card border-0 shadow-sm h-100">
                            <div class="card-body">
                                <h6 class="card-title text-uppercase text-muted small fw-bold mb-3">Pelapor</h6>
                                <h5 class="card-title mb-3">${report.pelapor}</h5>
                                <h6 class="card-title text-uppercase text-muted small fw-bold mb-3">Kategori</h6>
                                <span class="badge bg-${getStatusBg(report.statusClass)} fs-6 px-3 py-2">${report.kategori}</span>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card border-0 shadow-sm h-100">
                            <div class="card-body">
                                <h6 class="card-title text-uppercase text-muted small fw-bold mb-3">Tanggal</h6>
                                <h5 class="card-title mb-3">${report.tanggal}</h5>
                                <h6 class="card-title text-uppercase text-muted small fw-bold mb-3">Status</h6>
                                <span class="badge bg-${getStatusBg(report.statusClass)} fs-6 px-3 py-2">${report.status}</span>
                            </div>
                        </div>
                    </div>
                </div>
                <hr class="my-4">
                <div class="row">
                    <div class="col-12">
                        <h6 class="text-uppercase text-muted small fw-bold mb-3">Deskripsi</h6>
                        <p class="lead">Ini adalah deskripsi lengkap laporan #${report.id}. Modal ini dinamis dan menggunakan data lokal dari array JavaScript.</p>
                    </div>
                </div>
            `;

            // Tampilkan modal Bootstrap
            const modal = new bootstrap.Modal(document.getElementById('reportDetailModal'));
            modal.show();
        }
    </script>
</body>
</html>
