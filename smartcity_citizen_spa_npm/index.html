<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Citizen Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg border-bottom bg-white sticky-top">
        <div class="container-fluid px-3 px-lg-4">
            <a class="navbar-brand fw-semibold d-flex align-items-center gap-2" href="#dashboard">
                <i class="bi bi-buildings text-primary"></i>
                Citizen Portal
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <div class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
                    <a class="nav-link" href="#dashboard" data-route-link="dashboard">
                        <i class="bi bi-grid-1x2 me-1"></i>Dashboard
                    </a>
                    <a class="nav-link" href="#login" data-route-link="login">
                        <i class="bi bi-box-arrow-in-right me-1"></i>Login
                    </a>
                    <button class="btn btn-outline-danger btn-sm d-none" id="logoutButton" type="button">
                        <i class="bi bi-box-arrow-right me-1"></i>Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main id="app" class="app-shell"></main>

    <div class="modal fade" id="reportModal" tabindex="-1" aria-labelledby="reportModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 class="modal-title h5" id="reportModalLabel">Buat Laporan Baru</h2>
                    <button class="btn-close" type="button" data-bs-dismiss="modal" aria-label="Tutup"></button>
                </div>
                <div class="modal-body">
                    <div id="reportFormAlert" class="alert d-none" role="alert"></div>
                    <form id="reportForm">
                        <div class="row g-3">
                            <div class="col-12 col-md-6">
                                <label for="reportTitle" class="form-label">Judul</label>
                                <input class="form-control" id="inputTitle" name="title" required>
                            </div>
                            <div class="col-12 col-md-6">
                                <label for="reportCategory" class="form-label">Kategori</label>
                                <select class="form-select" id="inputCategory" name="category" required>
                                    <option value="">Pilih kategori</option>
                                    <option value="Infrastruktur">Infrastruktur</option>
                                    <option value="Fasilitas">Fasilitas</option>
                                    <option value="Keamanan">Keamanan</option>
                                    <option value="Kebersihan">Kebersihan</option>
                                    <option value="Lalu Lintas">Lalu Lintas</option>
                                    <option value="Umum">Umum</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label for="reportLocation" class="form-label">Lokasi</label>
                                <input class="form-control" id="inputLocation" name="location" required>
                            </div>
                            <div class="col-12">
                                <label for="reportDescription" class="form-label">Deskripsi</label>
                                <textarea class="form-control" id="inputDescription" name="description" rows="4" required></textarea>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-outline-secondary" type="button" data-bs-dismiss="modal">Batal</button>
                    <button class="btn btn-outline-primary" id="btnDraft" data-testid="btnDraft" type="button">
                        <i class="bi bi-save me-1"></i>Simpan Draft
                    </button>
                    <button class="btn btn-primary" id="btnSubmit" data-testid="btnSubmit" type="button">
                        <i class="bi bi-send me-1"></i>Ajukan
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/views.js"></script>
    <script src="js/router.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
