<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Modal Bootstrap 5 + Fetch Django - Report Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-12">
                <h1 class="h2 mb-4">Demo Modal Detail Laporan</h1>
                <p class="lead mb-4 text-muted">Klik "Detail" → Fetch data dari <code>/reports/<id>/detail/</code> → Modal Bootstrap 5.</p>

                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Judul</th>
                                <th>Pelapor</th>
                                <th>Kategori</th>
                                <th>Lokasi</th>
                                <th>Tanggal</th>
                                <th>Status</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="reportTableBody">
                            <!-- Diisi JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Bootstrap 5 Dinamis -->
    <div class="modal fade" id="reportDetailModal" tabindex="-1" aria-labelledby="reportDetailModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0">
                    <h2 class="modal-title h4 mb-0" id="reportDetailModalLabel">Memuat detail laporan...</h2>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Tutup"></button>
                </div>
                <div class="modal-body" id="reportDetailBody">
                    <div class="text-center py-5">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Memuat...</span>
                        </div>
                        <p class="mt-3 text-muted">Mengambil data dari server...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Mock data untuk demo table (seperti Django {{ for report in reports }})
        const mockReports = [
            { id: 1, judul: 'Pojok Sampah Menumpuk', pelapor: 'Budi Santoso', kategori: 'Kebersihan', lokasi: 'Pasar Tugu', tanggal: '2024-10-15 08:30', status: 'In Progress', statusClass: 'warning' },
            { id: 2, judul: 'Lampu Jalan Rusak', pelapor: 'Siti Aminah', kategori: 'Infrastruktur', lokasi: 'Jln. Teuku Umar', tanggal: '2024-10-14 16:45', status: 'Verified', statusClass: 'info' },
            { id: 3, judul: 'Air Limbah Ilegal', pelapor: 'Ahmad Fauzi', kategori: 'Lingkungan', lokasi: 'Sungai Wayne', tanggal: '2024-10-13 11:20', status: 'Resolved', statusClass: 'success' },
            { id: 4, judul: 'Jalan Berlubang', pelapor: 'Dewi Sartika', kategori: 'Infrastruktur', lokasi: 'Gang Merdeka', tanggal: '2024-10-12 14:10', status: 'Reported', statusClass: 'secondary' },
            { id: 5, judul: 'Pohon Tumbang', pelapor: 'Rudi Hartono', kategori: 'Bencana', lokasi: 'Jln. Sudirman', tanggal: '2024-10-11 09:55', status: 'In Progress', statusClass: 'warning' }
        ];

        // Render table
        document.addEventListener('DOMContentLoaded', function () {
            const tbody = document.getElementById('reportTableBody');
            tbody.innerHTML = mockReports.map(report => `
                <tr>
                    <td><strong>${report.id}</strong></td>
                    <td>${report.judul}</td>
                    <td>${report.pelapor}</td>
                    <td><span class="badge bg-${report.statusClass}">${report.kategori}</span></td>
                    <td>${report.lokasi}</td>
                    <td>${report.tanggal}</td>
                    <td><span class="badge bg-${report.statusClass}">${report.status}</span></td>
                    <td>
                        <button class="btn btn-sm btn-outline-primary" data-id="${report.id}">
                            <i class="bi bi-eye"></i> Detail
                        </button>
                    </td>
                </tr>
            `).join('');

            // Event delegation untuk tombol Detail
            document.addEventListener('click', function (e) {
                const btn = e.target.closest('button[data-id]');
                if (btn) {
                    const id = btn.dataset.id;
                    fetchReportDetail(id);
                }
            });
        });

        // Fetch data dari Django endpoint
        async function fetchReportDetail(id) {
            const modal = new bootstrap.Modal(document.getElementById('reportDetailModal'));
            modal.show();

            const titleEl = document.getElementById('reportDetailModalLabel');
            const bodyEl = document.getElementById('reportDetailBody');

            titleEl.textContent = 'Memuat detail laporan...';

            try {
                // Ganti dengan endpoint Django real: `/reports/${id}/detail/`
                // Demo: mock response dengan delay
                const response = await fetch(`/reports/${id}/detail/`, {
                    method: 'GET',
                    headers: {
                        'X-Requested-With': 'XMLHttpRequest',
                        // CSRF tidak diperlukan untuk GET safe request
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();

                // Render modal dengan data JSON
                titleEl.textContent = data.judul || 'Detail Laporan';
                bodyEl.innerHTML = `
                    <div class="row g-4 mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold text-muted small text-uppercase">Pelapor</label>
                            <div class="h5 mb-3">${data.pelapor || 'N/A'}</div>
                            <label class="form-label fw-bold text-muted small text-uppercase">Kategori</label>
                            <span class="badge bg-info fs-6 px-3 py-2">${data.kategori || 'N/A'}</span>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold text-muted small text-uppercase">Lokasi</label>
                            <div class="h5 mb-3">${data.lokasi || 'N/A'}</div>
                            <label class="form-label fw-bold text-muted small text-uppercase">Status</label>
                            <span class="badge bg-warning fs-6 px-3 py-2">${data.status || 'N/A'}</span>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6">
                            <label class="form-label fw-bold text-muted small text-uppercase">Tanggal</label>
                            <div class="h5">${data.tanggal || 'N/A'}</div>
                        </div>
                    </div>
                `;

            } catch (error) {
                console.error('Fetch error:', error);
                titleEl.textContent = 'Error Memuat Data';
                bodyEl.innerHTML = `
                    <div class="alert alert-danger">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>
                        Gagal memuat data. Silakan coba lagi.
                        <details class="mt-2 small">
                            <summary>Detail error</summary>
                            <pre>${error.message}</pre>
                        </details>
                    </div>
                `;
            }
        }

        // Mock fetch untuk demo (hapus di production)
        const originalFetch = window.fetch;
        window.fetch = async function(url, options) {
            if (url.includes('/reports/') && url.includes('/detail/')) {
                // Simulate server response
                return new Promise(resolve => {
                    setTimeout(() => {
                        const id = url.match(/\/(\d+)\/detail\//)?.[1];
                        const mockData = mockReports.find(r => r.id == id) || {
                            judul: 'Laporan tidak ditemukan',
                            pelapor: 'N/A', kategori: 'N/A', lokasi: 'N/A', status: 'Error', tanggal: 'N/A'
                        };
                        resolve({
                            ok: true,
                            json: async () => mockData
                        });
                    }, 800);
                });
            }
            return originalFetch(url, options);
        };
    </script>
</body>
</html>
