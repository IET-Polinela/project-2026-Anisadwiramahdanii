<!DOCTYPE html>
<html>
<head>
    <title>Smart City</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #ffb6c1 0%, #dda0dd 50%, #ba55d3 100%);
            min-height: 100vh;
            font-family: 'Nunito', sans-serif;
        }
        .container {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(186, 85, 211, 0.4);
            margin-top: 20px;
            animation: fadeInUp 1s ease-out;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }
        .table-hover tbody tr:hover {
            background-color: rgba(221, 160, 221, 0.1);
            transform: scale(1.01);
            transition: all 0.2s ease;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(186, 85, 211, 0.3);
            transition: all 0.3s ease;
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Nunito', sans-serif;
            color: #e91e63;
            font-weight: 600;
        }
        .navbar {
            background: linear-gradient(90deg, #ffb6c1, #dda0dd);
            border-radius: 10px;
        }
        .navbar-brand {
            font-family: 'Nunito', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
        }
        .btn-primary {
            background-color: #ff69b4;
            border-color: #ff69b4;
        }
        .btn-primary:hover {
            background-color: #e91e63;
            border-color: #e91e63;
        }
        .badge {
            font-weight: normal;
        }
        .card {
            border-radius: 15px;
            border: 2px solid #dda0dd;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="{% url 'home' %}">
            <i class="bi bi-heart-fill"></i> Smart City
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'home' %}">Beranda</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'create_report' %}">Tambah Laporan</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

<footer class="text-center mt-5 py-4" style="background: linear-gradient(90deg, #ffb6c1, #dda0dd); color: white; border-radius: 10px;">
    <p>&copy; 2026 Smart City Issue Reporting. Dibuat Oleh Anisa Dwi Ramahdani.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
